services:
  - type: web
    name: liquidity-levels-display
    env: node
    plan: free
    branch: main
    buildCommand: corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/readyz
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: liquidity-levels-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://your-domain.com
      - key: PUBLIC_APP_URL
        value: https://your-domain.com
      - key: API_RATE_LIMIT_MAX
        value: "900"
      - key: SESSION_SECRET
        value: change-me-in-production
      - key: SERVER_REQUEST_TIMEOUT_MS
        value: "30000"

databases:
  - name: liquidity-levels-db
    plan: free
    user: postgres
